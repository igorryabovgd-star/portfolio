<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Igor Ryabov Portfolio</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
}

.project{
position:absolute;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.project img{
width:100vw;
height:100vh;
object-fit:contain;
position:absolute;
opacity:0;
transition:opacity 0.8s ease;
}

.project img.active{
opacity:1;
}

</style>

</head>

<body>

<div class="project" id="project"></div>

<script>

const projects = [
[
"projects/project1/1.png",
],

[
"projects/project2/1.png",
"projects/project2/2.png"
]

]

let projectIndex = 0
let slideIndex = 0

const container = document.getElementById("project")

function showSlide(){

const img = document.createElement("img")
img.src = projects[projectIndex][slideIndex]

container.appendChild(img)

setTimeout(()=>{
img.classList.add("active")
},50)

if(container.children.length > 1){
setTimeout(()=>{
container.removeChild(container.children[0])
},800)
}

}

showSlide()


// автоматическая смена слайдов
setInterval(()=>{

slideIndex++

if(slideIndex >= projects[projectIndex].length){
slideIndex = 0
}

showSlide()

},3000)


// колесо мыши переключает проекты
window.addEventListener("wheel",e=>{

if(e.deltaY>0){
projectIndex++
}else{
projectIndex--
}

if(projectIndex >= projects.length){
projectIndex = 0
}

if(projectIndex < 0){
projectIndex = projects.length - 1
}

slideIndex = 0

container.innerHTML = ""

showSlide()

})

</script>

</body>
</html>
