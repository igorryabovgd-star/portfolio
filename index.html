<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Igor Ryabov Portfolio</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial,sans-serif;
cursor:pointer;
opacity:0;
transition:opacity 1.2s ease;
}

body.hideCursor{
cursor:none;
}

.project{
position:absolute;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.project img{
position:absolute;
width:100vw;
height:100vh;
object-fit:contain;
opacity:0;
transition:opacity 0.8s ease;
pointer-events:none;
}

.project img.active{
opacity:1;
}

.projectTitle{
position:fixed;
top:30px;
left:30px;
color:rgba(128,128,128,0.8);
font-size:13px;
letter-spacing:0.05em;
z-index:999;
pointer-events:none;
}

.name{
position:fixed;
top:30px;
right:30px;
color:rgba(128,128,128,0.8);
font-size:13px;
letter-spacing:0.05em;
z-index:999;
pointer-events:none;
}

.email{
position:fixed;
bottom:30px;
right:30px;
color:rgba(128,128,128,0.8);
text-decoration:none;
font-size:13px;
letter-spacing:0.05em;
z-index:999;
cursor:auto;
}

.email:hover{
opacity:0.5;
}

</style>

</head>

<body>

<div class="project">

<img id="imgA">
<img id="imgB">

</div>

<div class="projectTitle" id="projectTitle"></div>

<div class="name">igor ryabov</div>

<a class="email" href="mailto:igorryabovgd@gmail.com">email</a>

<script>

const repoUser="igorryabovgd-star"
const repoName="portfolio"

const projects=[

{
title:"tripster",
folder:"projects/tripster"
}

]

let slides=[]
let slideIndex=0

const imgA=document.getElementById("imgA")
const imgB=document.getElementById("imgB")
const title=document.getElementById("projectTitle")

let current=imgA
let next=imgB

let slideTimer

async function loadSlides(){

const project=projects[0]

const url=`https://api.github.com/repos/${repoUser}/${repoName}/contents/${project.folder}`

const response=await fetch(url)
const data=await response.json()

slides=data
.filter(file=>file.name.match(/\.(png|jpg|jpeg|webp)$/i))
.sort((a,b)=>a.name.localeCompare(b.name,{numeric:true}))
.map(file=>file.download_url)

preload()

showSlide()
startSlider()

}

function preload(){

slides.forEach(src=>{
const img=new Image()
img.src=src
})

}

function showSlide(){

title.textContent=projects[0].title

next.src=slides[slideIndex]

requestAnimationFrame(()=>{

next.classList.add("active")
current.classList.remove("active")

})

setTimeout(()=>{

[current,next]=[next,current]

},800)

}

function nextSlide(){

slideIndex++

if(slideIndex>=slides.length){
slideIndex=0
}

showSlide()

}

function startSlider(){

clearInterval(slideTimer)
slideTimer=setInterval(nextSlide,3000)

}

window.addEventListener("click",(e)=>{

if(e.target.classList.contains("email")) return

nextSlide()

})

window.addEventListener("keydown",(e)=>{

if(e.key==="ArrowRight") nextSlide()
if(e.key==="ArrowLeft"){
slideIndex--
if(slideIndex<0) slideIndex=slides.length-1
showSlide()
}

})

window.addEventListener("load",()=>{

loadSlides()

document.body.style.opacity=1

})

let cursorTimer

function hideCursor(){
document.body.classList.add("hideCursor")
}

function resetCursor(){

document.body.classList.remove("hideCursor")

clearTimeout(cursorTimer)
cursorTimer=setTimeout(hideCursor,2000)

}

window.addEventListener("mousemove",resetCursor)
window.addEventListener("mousedown",resetCursor)

resetCursor()

</script>

</body>
</html>
