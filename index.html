<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Igor Ryabov Portfolio</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial, sans-serif;
cursor:pointer;
opacity:0;
transition:opacity 1.2s ease;
}

body.hideCursor{
cursor:none;
}

.bg{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
opacity:0;
transition:opacity 0.8s ease;
z-index:-1;
}

.bg.active{
opacity:1;
}

.project{
position:absolute;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.project img{
position:absolute;
width:100vw;
height:100vh;
object-fit:contain;
opacity:0;
transition:opacity 0.8s ease;
pointer-events:none;
}

.project img.active{
opacity:1;
}

.projectTitle{
position:fixed;
top:30px;
left:30px;
color:rgba(128,128,128,0.8);
font-size:13px;
letter-spacing:0.05em;
z-index:999;
}

.name{
position:fixed;
top:30px;
right:30px;
color:rgba(128,128,128,0.8);
font-size:13px;
letter-spacing:0.05em;
z-index:999;
}

.email{
position:fixed;
bottom:30px;
right:30px;
color:rgba(128,128,128,0.8);
text-decoration:none;
font-size:13px;
letter-spacing:0.05em;
z-index:999;
cursor:auto;
}

.email:hover{
opacity:0.5;
}

</style>

</head>

<body>

<div id="bgA" class="bg active"></div>
<div id="bgB" class="bg"></div>

<div class="project">
<img id="imgA">
<img id="imgB">
</div>

<div class="projectTitle" id="projectTitle"></div>

<div class="name">igor ryabov</div>

<a class="email" href="mailto:igorryabovgd@gmail.com">email</a>

<script>

function getBackground(src){

let name = src.split("/").pop().replace(".webp","")
let parts = name.split("_")

if(parts.length === 1) return "white"

let suffix = parts[1]

if(suffix === "b") return "black"

return "#" + suffix

}

const projects = [

{
title:"vegastar",
slides:[

"projects/vegastar/01.webp",
"projects/vegastar/02_b.webp",
"projects/vegastar/03.webp",
"projects/vegastar/04.webp",
"projects/vegastar/05.webp",
"projects/vegastar/06.webp",
"projects/vegastar/07.webp",
"projects/vegastar/08.webp",
"projects/vegastar/09.webp",
"projects/vegastar/10.webp",
"projects/vegastar/11_b.webp",
"projects/vegastar/12_F7F7F7.webp",
"projects/vegastar/13_F7F7F7.webp",
"projects/vegastar/14_b.webp"

]

}

]

let projectIndex = 0
let slideIndex = 0

const imgA = document.getElementById("imgA")
const imgB = document.getElementById("imgB")

const bgA = document.getElementById("bgA")
const bgB = document.getElementById("bgB")

const projectTitle = document.getElementById("projectTitle")

let currentImg = imgA
let nextImg = imgB

let currentBg = bgA
let nextBg = bgB

let slideTimer

function showSlide(){

const project = projects[projectIndex]
const slides = project.slides

projectTitle.textContent = project.title

let src = slides[slideIndex]

let color = getBackground(src)

nextBg.style.background = color
nextBg.classList.add("active")
currentBg.classList.remove("active")

nextImg.src = src

requestAnimationFrame(()=>{

nextImg.classList.add("active")
currentImg.classList.remove("active")

})

setTimeout(()=>{

[currentImg,nextImg] = [nextImg,currentImg]
[currentBg,nextBg] = [nextBg,currentBg]

},800)

}

function nextSlide(){

slideIndex++

if(slideIndex >= projects[projectIndex].slides.length){
slideIndex = 0
}

showSlide()

}

function startSlider(){

clearInterval(slideTimer)
slideTimer = setInterval(nextSlide,3000)

}

window.addEventListener("load",()=>{

showSlide()
startSlider()

document.body.style.opacity = 1

})

window.addEventListener("click",(e)=>{

if(e.target.classList.contains("email")) return

projectIndex++

if(projectIndex >= projects.length){
projectIndex = 0
}

slideIndex = 0

showSlide()
startSlider()

})

let cursorTimer

function hideCursor(){
document.body.classList.add("hideCursor")
}

function resetCursor(){

document.body.classList.remove("hideCursor")

clearTimeout(cursorTimer)
cursorTimer = setTimeout(hideCursor,2000)

}

window.addEventListener("mousemove",resetCursor)

resetCursor()

</script>

</body>
</html>
