<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Igor Ryabov Portfolio</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial, sans-serif;
}

.project{
position:absolute;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.project img{
width:100vw;
height:100vh;
object-fit:contain;
position:absolute;
opacity:0;
transition:opacity 0.8s ease;
}

.project img.active{
opacity:1;
}

.email{
position:fixed;
bottom:30px;
right:30px;
color:white;
text-decoration:none;
font-size:13px;
letter-spacing:0.05em;
opacity:0.6;
transition:opacity 0.3s;
z-index:10;
}

.email:hover{
opacity:1;
}

</style>

</head>

<body>

<div class="project" id="project"></div>

<a class="email" href="mailto:your@email.com">email</a>

<script>

const projects = [
[
"projects/project1/1.png",
],

[
"projects/project2/1.png",
"projects/project2/2.png"
]

]

let projectIndex = 0
let slideIndex = 0

const container = document.getElementById("project")

function showSlide(){

const img = document.createElement("img")
img.src = projects[projectIndex][slideIndex]

container.appendChild(img)

setTimeout(()=>{
img.classList.add("active")
},50)

if(container.children.length > 1){
setTimeout(()=>{
container.removeChild(container.children[0])
},800)
}

}

showSlide()


// смена слайдов
setInterval(()=>{

slideIndex++

if(slideIndex >= projects[projectIndex].length){
slideIndex = 0
}

showSlide()

},3000)


// клик → следующий проект
window.addEventListener("click",()=>{

projectIndex++

if(projectIndex >= projects.length){
projectIndex = 0
}

slideIndex = 0

container.innerHTML = ""

showSlide()

})

</script>

</body>
</html>
