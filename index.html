<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Igor Ryabov Portfolio</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial, sans-serif;
cursor:pointer;
}

.project{
position:absolute;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.project img{
position:absolute;
width:100vw;
height:100vh;
object-fit:contain;
opacity:0;
transition:opacity 0.8s ease;
pointer-events:none;
}

.project img.active{
opacity:1;
}

.email{
position:fixed;
top:30px;
right:30px;
color:white;
text-decoration:none;
font-size:13px;
letter-spacing:0.05em;
opacity:0.6;
transition:opacity 0.3s;
z-index:999;
}

.email:hover{
opacity:1;
}

</style>

</head>

<body>

<div class="project">

<img id="imgA">
<img id="imgB">

</div>

<a class="email" href="mailto:igorryabovgd@gmail.com">email</a>

<script>

const projects = [

[
"projects/project1/1.png"
],

[
"projects/project2/1.png",
"projects/project2/2.png"
]

]

let projectIndex = 0
let slideIndex = 0

const imgA = document.getElementById("imgA")
const imgB = document.getElementById("imgB")

let current = imgA
let next = imgB

// preload всех изображений
projects.flat().forEach(src=>{
const img = new Image()
img.src = src
})

function showSlide(){

const slides = projects[projectIndex]

next.src = slides[slideIndex]

requestAnimationFrame(()=>{

next.classList.add("active")
current.classList.remove("active")

})

setTimeout(()=>{

[current,next] = [next,current]

},800)

}

function nextSlide(){

slideIndex++

if(slideIndex >= projects[projectIndex].length){
slideIndex = 0
}

showSlide()

}

showSlide()

setInterval(nextSlide,3000)

function nextProject(){

projectIndex++

if(projectIndex >= projects.length){
projectIndex = 0
}

slideIndex = 0
showSlide()

}

function prevProject(){

projectIndex--

if(projectIndex < 0){
projectIndex = projects.length-1
}

slideIndex = 0
showSlide()

}

window.addEventListener("click",(e)=>{

if(e.target.classList.contains("email")) return
nextProject()

})

window.addEventListener("keydown",(e)=>{

if(e.key==="ArrowRight") nextProject()
if(e.key==="ArrowLeft") prevProject()

})

</script>

</body>
</html>
