<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Igor Ryabov Portfolio</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
}

.project{
position:absolute;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.project img{
max-width:90vw;
max-height:90vh;
object-fit:contain;
}

</style>

</head>

<body>

<div class="project" id="project"></div>

<script>

const projects = [
[
"projects/project1/1.png",
],

[
"projects/project2/1.png",
"projects/project2/2.png"
]

]

let projectIndex = 0
let slideIndex = 0

const container = document.getElementById("project")

function showSlide(){

container.innerHTML = ""

let img = document.createElement("img")
img.src = projects[projectIndex][slideIndex]

container.appendChild(img)

}

showSlide()

window.addEventListener("wheel",e=>{

if(e.deltaY>0){

slideIndex++

if(slideIndex>=projects[projectIndex].length){

slideIndex=0
projectIndex++

if(projectIndex>=projects.length){
projectIndex=0
}

}

}else{

slideIndex--

if(slideIndex<0){

projectIndex--

if(projectIndex<0){
projectIndex=projects.length-1
}

slideIndex=projects[projectIndex].length-1

}

}

showSlide()

})

</script>

</body>
</html>
